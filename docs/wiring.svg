<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title{font-size:24px;font-weight:700;fill:#0f172a}
      .sub{font-size:13px;fill:#475569}
      .pin{font-size:11px;font-weight:700;fill:#fff}
      .comp{font-size:14px;font-weight:700;fill:#0f172a}
      .compsub{font-size:11px;fill:#475569}
      .wlabel{font-size:10px;fill:#334155;font-weight:600}
      .legend{font-size:12px;fill:#334155}
      .opt{font-size:10px;font-weight:700;fill:#b45309}
    </style>
  </defs>

  <rect width="980" height="720" fill="#f8fafc"/>
  <text x="30" y="40" class="title">🌱 Smart Greenhouse — Sơ đồ đấu nối</text>
  <text x="30" y="62" class="sub">Tất cả cảm biến/actuator gắn trên Arduino. Arduino nối Pi bằng CÁP USB (không dùng dây TX/RX).</text>

  <!-- ===================== ARDUINO BOARD ===================== -->
  <rect x="40" y="120" width="230" height="470" rx="14" fill="#0d7377" stroke="#0a5559" stroke-width="2"/>
  <text x="155" y="148" text-anchor="middle" class="comp" fill="#fff">ARDUINO UNO</text>
  <text x="155" y="166" text-anchor="middle" class="compsub" fill="#bdf">R3</text>

  <!-- USB stub -->
  <rect x="20" y="180" width="22" height="34" rx="3" fill="#cbd5e1" stroke="#94a3b8"/>
  <text x="31" y="172" text-anchor="middle" class="wlabel">USB</text>

  <!-- digital pins (right edge) -->
  <!-- D7 -->
  <rect x="244" y="210" width="42" height="24" rx="4" fill="#1e293b"/><text x="265" y="227" text-anchor="middle" class="pin">D7</text>
  <!-- D9 -->
  <rect x="244" y="250" width="42" height="24" rx="4" fill="#1e293b"/><text x="265" y="267" text-anchor="middle" class="pin">D9~</text>
  <!-- D2 -->
  <rect x="244" y="290" width="42" height="24" rx="4" fill="#1e293b"/><text x="265" y="307" text-anchor="middle" class="pin">D2</text>

  <!-- analog/power pins (left-bottom) -->
  <!-- 5V -->
  <rect x="24" y="360" width="42" height="24" rx="4" fill="#b91c1c"/><text x="45" y="377" text-anchor="middle" class="pin">5V</text>
  <!-- GND -->
  <rect x="24" y="396" width="42" height="24" rx="4" fill="#111827"/><text x="45" y="413" text-anchor="middle" class="pin">GND</text>
  <!-- A0 -->
  <rect x="24" y="432" width="42" height="24" rx="4" fill="#1e293b"/><text x="45" y="449" text-anchor="middle" class="pin">A0</text>
  <!-- A4 SDA -->
  <rect x="24" y="500" width="42" height="24" rx="4" fill="#7c3aed"/><text x="45" y="517" text-anchor="middle" class="pin">A4</text>
  <!-- A5 SCL -->
  <rect x="24" y="536" width="42" height="24" rx="4" fill="#7c3aed"/><text x="45" y="553" text-anchor="middle" class="pin">A5</text>

  <!-- ===================== COMPONENTS ===================== -->

  <!-- DHT11 -->
  <rect x="540" y="190" width="200" height="80" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="640" y="216" text-anchor="middle" class="comp">DHT11</text>
  <text x="640" y="234" text-anchor="middle" class="compsub">Nhiệt độ + Độ ẩm</text>
  <circle cx="560" cy="255" r="5" fill="#b91c1c"/><text x="572" y="259" class="wlabel">VCC</text>
  <circle cx="640" cy="255" r="5" fill="#eab308"/><text x="652" y="259" class="wlabel">DATA</text>
  <circle cx="715" cy="255" r="5" fill="#111827"/><text x="690" y="259" class="wlabel">GND</text>

  <!-- LDR -->
  <rect x="540" y="300" width="200" height="95" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="640" y="324" text-anchor="middle" class="comp">LDR + R 10kΩ</text>
  <text x="640" y="342" text-anchor="middle" class="compsub">cầu chia áp → A0</text>
  <text x="640" y="378" text-anchor="middle" class="compsub" font-size="10">5V —[LDR]—•(A0)—[10kΩ]— GND</text>
  <circle cx="560" cy="392" r="5" fill="#b91c1c"/>
  <circle cx="640" cy="392" r="5" fill="#eab308"/>
  <circle cx="715" cy="392" r="5" fill="#111827"/>

  <!-- LED -->
  <rect x="540" y="420" width="200" height="78" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="640" y="444" text-anchor="middle" class="comp">LED đèn + R 220Ω</text>
  <text x="640" y="462" text-anchor="middle" class="compsub">chân dài (+) qua trở → D7</text>
  <circle cx="585" cy="483" r="5" fill="#eab308"/><text x="597" y="487" class="wlabel">+ (qua 220Ω)</text>
  <circle cx="700" cy="483" r="5" fill="#111827"/><text x="675" y="487" class="wlabel">– GND</text>

  <!-- Servo (optional) -->
  <rect x="540" y="520" width="200" height="78" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="640" y="543" text-anchor="middle" class="comp">Servo SG90</text>
  <text x="745" y="528" class="opt">TUỲ CHỌN</text>
  <text x="640" y="561" text-anchor="middle" class="compsub">cửa thông gió</text>
  <circle cx="565" cy="582" r="5" fill="#b91c1c"/><text x="575" y="586" class="wlabel">Đỏ 5V</text>
  <circle cx="640" cy="582" r="5" fill="#f97316"/><text x="650" y="586" class="wlabel">Cam D9</text>
  <circle cx="715" cy="582" r="5" fill="#111827"/><text x="690" y="586" class="wlabel">Nâu GND</text>

  <!-- LCD (optional) -->
  <rect x="540" y="620" width="200" height="78" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="640" y="643" text-anchor="middle" class="comp">LCD1602 + I2C</text>
  <text x="745" y="628" class="opt">TUỲ CHỌN</text>
  <text x="640" y="661" text-anchor="middle" class="compsub">địa chỉ 0x27 (hoặc 0x3F)</text>
  <circle cx="558" cy="682" r="5" fill="#b91c1c"/><text x="567" y="686" class="wlabel">VCC</text>
  <circle cx="605" cy="682" r="5" fill="#111827"/><text x="614" y="686" class="wlabel">GND</text>
  <circle cx="660" cy="682" r="5" fill="#7c3aed"/><text x="669" y="686" class="wlabel">SDA</text>
  <circle cx="712" cy="682" r="5" fill="#7c3aed"/><text x="690" y="686" class="wlabel">SCL</text>

  <!-- ===================== WIRES ===================== -->
  <!-- DHT11: VCC->5V(red), DATA->D2(yellow), GND->GND(black) -->
  <path d="M560 255 C 360 255, 200 372, 66 372" stroke="#b91c1c" stroke-width="3" fill="none"/>
  <path d="M640 255 C 420 200, 360 302, 286 302" stroke="#eab308" stroke-width="3" fill="none"/>
  <path d="M715 255 C 460 150, 200 408, 66 408" stroke="#111827" stroke-width="3" fill="none"/>

  <!-- LDR: VCC->5V, A0->A0, GND->GND -->
  <path d="M560 392 C 360 392, 180 372, 66 372" stroke="#b91c1c" stroke-width="3" fill="none" stroke-dasharray="1"/>
  <path d="M640 392 C 360 444, 200 444, 66 444" stroke="#eab308" stroke-width="3" fill="none"/>
  <path d="M715 392 C 420 460, 200 408, 66 408" stroke="#111827" stroke-width="3" fill="none" stroke-dasharray="1"/>

  <!-- LED: + -> D7, - -> GND -->
  <path d="M585 483 C 400 483, 360 222, 286 222" stroke="#eab308" stroke-width="3" fill="none"/>
  <path d="M700 483 C 420 500, 200 408, 66 408" stroke="#111827" stroke-width="3" fill="none" stroke-dasharray="1"/>

  <!-- Servo: 5V, D9, GND -->
  <path d="M565 582 C 360 582, 180 372, 66 372" stroke="#b91c1c" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M640 582 C 400 540, 360 262, 286 262" stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M715 582 C 420 600, 200 408, 66 408" stroke="#111827" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>

  <!-- LCD: VCC, GND, SDA->A4, SCL->A5 -->
  <path d="M558 682 C 360 682, 180 372, 66 372" stroke="#b91c1c" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M605 682 C 360 660, 200 408, 66 408" stroke="#111827" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M660 682 C 360 560, 200 512, 66 512" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M712 682 C 380 620, 200 548, 66 548" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>

  <!-- USB to Pi note -->
  <rect x="40" y="630" width="430" height="62" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="55" y="655" class="comp" fill="#9a3412">⎘ CÁP USB → Raspberry Pi</text>
  <text x="55" y="676" class="compsub">Cắm USB Arduino vào cổng USB của Pi. Pi đọc /dev/ttyACM0. KHÔNG nối TX/RX.</text>

  <!-- ===================== LEGEND ===================== -->
  <text x="790" y="150" class="comp">Chú thích dây</text>
  <line x1="790" y1="170" x2="820" y2="170" stroke="#b91c1c" stroke-width="4"/><text x="828" y="174" class="legend">Đỏ = 5V (nguồn)</text>
  <line x1="790" y1="192" x2="820" y2="192" stroke="#111827" stroke-width="4"/><text x="828" y="196" class="legend">Đen = GND (mát)</text>
  <line x1="790" y1="214" x2="820" y2="214" stroke="#eab308" stroke-width="4"/><text x="828" y="218" class="legend">Vàng = tín hiệu data</text>
  <line x1="790" y1="236" x2="820" y2="236" stroke="#f97316" stroke-width="4"/><text x="828" y="240" class="legend">Cam = PWM servo</text>
  <line x1="790" y1="258" x2="820" y2="258" stroke="#7c3aed" stroke-width="4"/><text x="828" y="262" class="legend">Tím = I2C (SDA/SCL)</text>
  <line x1="790" y1="282" x2="820" y2="282" stroke="#64748b" stroke-width="3" stroke-dasharray="6 3"/><text x="828" y="286" class="legend">Nét đứt = phần tuỳ chọn</text>

  <rect x="780" y="320" width="180" height="120" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="792" y="344" class="comp" font-size="13">Thứ tự lắp</text>
  <text x="792" y="366" class="legend">1. DHT11 (D2)</text>
  <text x="792" y="386" class="legend">2. LDR (A0)</text>
  <text x="792" y="406" class="legend">3. LED (D7)</text>
  <text x="792" y="426" class="legend">4. USB → Pi, chạy Flask</text>
</svg>
